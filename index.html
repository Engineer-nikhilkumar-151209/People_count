<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Ludo Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 30px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .board-container {
            position: relative;
            width: 600px;
            height: 600px;
            border: 3px solid #333;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .board {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 1px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .cell {
            background: #fff;
            border: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8px;
            color: #999;
        }

        .cell.home {
            background: #ffe6e6;
            border: 2px solid #ff6b6b;
        }

        .cell.home.blue {
            background: #e6f0ff;
            border-color: #4299e1;
        }

        .cell.home.yellow {
            background: #fffbe6;
            border-color: #f9ca24;
        }

        .cell.home.green {
            background: #e6ffe6;
            border-color: #26a65b;
        }

        .cell.finish {
            background: #fff0e6;
            border: 2px solid #ff9500;
        }

        .cell.path {
            background: #fafafa;
        }

        .pawn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            transition: transform 0.2s;
            position: absolute;
            z-index: 10;
        }

        .pawn:hover {
            transform: scale(1.1);
        }

        .pawn.red {
            background: #ff4444;
            color: white;
        }

        .pawn.blue {
            background: #4299e1;
            color: white;
        }

        .pawn.yellow {
            background: #ffd700;
            color: #333;
        }

        .pawn.green {
            background: #52c41a;
            color: white;
        }

        .control-panel {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ddd;
            min-width: 250px;
        }

        .dice-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .dice {
            width: 80px;
            height: 80px;
            background: white;
            border: 3px solid #333;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px auto;
            user-select: none;
        }

        .dice:hover:not(.disabled) {
            background: #ffffcc;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .dice.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .dice-btn {
            padding: 12px 24px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            width: 100%;
        }

        .dice-btn:hover:not(.disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .dice-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-panel {
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .current-player {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .current-player.red {
            background: #ffcccc;
            color: #cc0000;
        }

        .current-player.blue {
            background: #cce5ff;
            color: #0052cc;
        }

        .current-player.yellow {
            background: #ffffcc;
            color: #cc8800;
        }

        .current-player.green {
            background: #ccffcc;
            color: #008800;
        }

        .dice-result {
            font-size: 16px;
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            text-align: center;
        }

        .player-status {
            margin-top: 15px;
            font-size: 13px;
        }

        .player-status-item {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            background: #f5f5f5;
            border-left: 4px solid #333;
        }

        .player-status-item.red {
            border-left-color: #ff4444;
        }

        .player-status-item.blue {
            border-left-color: #4299e1;
        }

        .player-status-item.yellow {
            border-left-color: #ffd700;
        }

        .player-status-item.green {
            border-left-color: #52c41a;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: #ee5a52;
            transform: translateY(-2px);
        }

        .message {
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }

        .message.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .message.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .board-container {
                width: 400px;
                height: 400px;
            }

            .control-panel {
                min-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <h1>🎲 Multiplayer Ludo Game 🎲</h1>
            <div class="board-container">
                <div class="board" id="board"></div>
                <div id="pawns-container"></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="dice-container">
                <h3>Roll Dice</h3>
                <div class="dice" id="dice">🎲</div>
                <button class="dice-btn" id="rollBtn" onclick="rollDice()">Roll Dice</button>
            </div>

            <div class="info-panel">
                <div class="current-player" id="currentPlayer">
                    <span id="playerColor"></span>'s Turn
                </div>
                <div class="dice-result" id="diceResult"></div>
                <div class="message" id="message"></div>
            </div>

            <div class="player-status" id="playerStatus"></div>

            <button class="reset-btn" onclick="resetGame()">New Game</button>
        </div>
    </div>

    <script>
        // Game Configuration
        const PLAYERS = ['red', 'blue', 'yellow', 'green'];
        const BOARD_SIZE = 15;
        const CELLS_PER_PLAYER = 52;
        const FINISH_LINE_CELLS = 6;

        // Game State
        let gameState = {
            currentPlayer: 0,
            diceValue: 0,
            playerPawns: {
                red: [0, -1, -1, -1],
                blue: [0, -1, -1, -1],
                yellow: [0, -1, -1, -1],
                green: [0, -1, -1, -1]
            },
            playerHomes: {
                red: [],
                blue: [],
                yellow: [],
                green: []
            },
            winner: null,
            canRoll: true,
            lastDiceValue: 0
        };

        // Pawn Positions (starting from specific cells for each player)
        const PLAYER_START_CELLS = {
            red: 0,
            blue: 13,
            yellow: 26,
            green: 39
        };

        const HOME_POSITIONS = {
            red: { row: 1, col: 1, size: 4 },
            blue: { row: 1, col: 13, size: 4 },
            yellow: { row: 13, col: 13, size: 4 },
            green: { row: 13, col: 1, size: 4 }
        };

        // Initialize Game
        function initializeGame() {
            resetGameState();
            renderBoard();
            renderPawns();
            updateUI();
        }

        function resetGameState() {
            gameState = {
                currentPlayer: 0,
                diceValue: 0,
                playerPawns: {
                    red: [0, -1, -1, -1],
                    blue: [0, -1, -1, -1],
                    yellow: [0, -1, -1, -1],
                    green: [0, -1, -1, -1]
                },
                playerHomes: {
                    red: [],
                    blue: [],
                    yellow: [],
                    green: []
                },
                winner: null,
                canRoll: true,
                lastDiceValue: 0
            };
        }

        // Render Board
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;

                // Add special cell classes
                if (isCellInPath(i)) {
                    cell.classList.add('path');
                }

                // Mark home cells
                const homeCell = findHomeCellPlayer(i);
                if (homeCell) {
                    cell.classList.add('home', homeCell);
                }

                // Mark finish line cells
                if (isCellInFinishLine(i)) {
                    cell.classList.add('finish');
                }

                board.appendChild(cell);
            }
        }

        function findHomeCellPlayer(cellIndex) {
            const row = Math.floor(cellIndex / BOARD_SIZE);
            const col = cellIndex % BOARD_SIZE;

            for (const player of PLAYERS) {
                const homePos = HOME_POSITIONS[player];
                if (row >= homePos.row && row < homePos.row + homePos.size &&
                    col >= homePos.col && col < homePos.col + homePos.size) {
                    return player;
                }
            }
            return null;
        }

        function isCellInPath(cellIndex) {
            const row = Math.floor(cellIndex / BOARD_SIZE);
            const col = cellIndex % BOARD_SIZE;

            // Mark main path
            if (row === 7 || col === 7) return true;

            return false;
        }

        function isCellInFinishLine(cellIndex) {
            return false; // Simplified for this version
        }

        // Render Pawns
        function renderPawns() {
            const container = document.getElementById('pawns-container');
            container.innerHTML = '';

            for (const player of PLAYERS) {
                const pawns = gameState.playerPawns[player];
                pawns.forEach((position, pawnIndex) => {
                    const pawn = document.createElement('div');
                    pawn.className = `pawn ${player}`;
                    pawn.id = `pawn-${player}-${pawnIndex}`;
                    pawn.textContent = pawnIndex + 1;

                    if (position === -1) {
                        // In home
                        const homePos = HOME_POSITIONS[player];
                        const homeIndex = gameState.playerHomes[player].indexOf(pawnIndex);
                        const cellRow = homePos.row + Math.floor(homeIndex / 2);
                        const cellCol = homePos.col + (homeIndex % 2);
                    } else {
                        // On board
                        const cellIndex = position;
                    }

                    const boardContainer = document.querySelector('.board-container');
                    const cellPos = getCellPosition(position, player, pawnIndex);
                    pawn.style.left = cellPos.x + 'px';
                    pawn.style.top = cellPos.y + 'px';

                    container.appendChild(pawn);
                });
            }
        }

        function getCellPosition(position, player, pawnIndex) {
            const boardContainer = document.querySelector('.board-container');
            const cellSize = 600 / BOARD_SIZE;

            if (position === -1) {
                const homePos = HOME_POSITIONS[player];
                const homeIndex = gameState.playerHomes[player].indexOf(pawnIndex);
                const row = homePos.row + Math.floor(homeIndex / 2);
                const col = homePos.col + (homeIndex % 2);
                return {
                    x: col * cellSize + cellSize / 4,
                    y: row * cellSize + cellSize / 4
                };
            }

            const row = Math.floor(position / BOARD_SIZE);
            const col = position % BOARD_SIZE;
            return {
                x: col * cellSize + cellSize / 4,
                y: row * cellSize + cellSize / 4
            };
        }

        // Roll Dice
        function rollDice() {
            if (!gameState.canRoll || gameState.winner) {
                showMessage('Cannot roll now!', 'error');
                return;
            }

            gameState.diceValue = Math.floor(Math.random() * 6) + 1;
            gameState.lastDiceValue = gameState.diceValue;

            const dice = document.getElementById('dice');
            dice.style.animation = 'none';
            setTimeout(() => {
                dice.textContent = getDiceEmoji(gameState.diceValue);
                dice.style.animation = 'spin 0.5s ease-out';
            }, 10);

            showMessage(`${PLAYERS[gameState.currentPlayer].toUpperCase()} rolled a ${gameState.diceValue}!`, 'info');
            updateDiceResult();

            // Check if any pawn can be moved
            setTimeout(() => {
                updateUI();
            }, 500);
        }

        function getDiceEmoji(value) {
            const diceEmojis = ['⬜', '1️⃣', '2️⃣', '3️⃣', '4️⃣', '5️⃣', '6️⃣'];
            return diceEmojis[value] || value;
        }

        function updateDiceResult() {
            document.getElementById('diceResult').textContent = `Dice: ${gameState.diceValue}`;
        }

        // Move Pawn
        function movePawn(player, pawnIndex) {
            if (PLAYERS[gameState.currentPlayer] !== player) {
                showMessage('Not your turn!', 'error');
                return;
            }

            const currentPos = gameState.playerPawns[player][pawnIndex];
            const newPos = currentPos + gameState.diceValue;

            // Check if pawn can move
            if (currentPos === -1) {
                // Pawn in home - needs to roll a 6 to move
                if (gameState.diceValue === 6) {
                    gameState.playerPawns[player][pawnIndex] = PLAYER_START_CELLS[player];
                    showMessage(`${player.toUpperCase()} pawn moved to start!`, 'success');
                } else {
                    showMessage('Need a 6 to move pawn from home!', 'error');
                    return;
                }
            } else if (newPos <= CELLS_PER_PLAYER * 4) {
                gameState.playerPawns[player][pawnIndex] = newPos;
                showMessage(`${player.toUpperCase()} pawn moved!`, 'success');

                // Check if reached finish line
                if (newPos >= CELLS_PER_PLAYER * 4 - FINISH_LINE_CELLS) {
                    checkWin();
                }
            }

            gameState.diceValue = 0;
            if (gameState.lastDiceValue !== 6) {
                nextPlayer();
            } else {
                showMessage(`${player.toUpperCase()} rolled a 6! Roll again!`, 'info');
            }

            renderPawns();
            updateUI();
        }

        function checkWin() {
            const player = PLAYERS[gameState.currentPlayer];
            const pawns = gameState.playerPawns[player];
            const allAtFinish = pawns.every(p => p >= CELLS_PER_PLAYER * 4 - FINISH_LINE_CELLS || p === -1);

            if (allAtFinish) {
                gameState.winner = player;
                showMessage(`🎉 ${player.toUpperCase()} WINS! 🎉`, 'success');
            }
        }

        function nextPlayer() {
            gameState.currentPlayer = (gameState.currentPlayer + 1) % PLAYERS.length;
            gameState.canRoll = true;
            updateUI();
        }

        // UI Updates
        function updateUI() {
            updateCurrentPlayer();
            updatePlayerStatus();
        }

        function updateCurrentPlayer() {
            const player = PLAYERS[gameState.currentPlayer];
            const playerColorSpan = document.getElementById('playerColor');
            const currentPlayerDiv = document.getElementById('currentPlayer');
            playerColorSpan.textContent = player.charAt(0).toUpperCase() + player.slice(1);
            currentPlayerDiv.className = `current-player ${player}`;

            const rollBtn = document.getElementById('rollBtn');
            if (gameState.winner) {
                rollBtn.classList.add('disabled');
                rollBtn.textContent = 'Game Over';
            } else {
                rollBtn.classList.remove('disabled');
                rollBtn.textContent = 'Roll Dice';
            }
        }

        function updatePlayerStatus() {
            const statusDiv = document.getElementById('playerStatus');
            statusDiv.innerHTML = '';

            for (const player of PLAYERS) {
                const pawns = gameState.playerPawns[player];
                const pawnStatus = pawns.map((p, i) => {
                    if (p === -1) return `P${i + 1}: Home`;
                    return `P${i + 1}: ${p}`;
                }).join(' | ');

                const statusItem = document.createElement('div');
                statusItem.className = `player-status-item ${player}`;
                statusItem.textContent = `${player.toUpperCase()}: ${pawnStatus}`;
                statusDiv.appendChild(statusItem);
            }
        }

        function showMessage(message, type = 'info') {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = message;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.textContent = '';
                msgDiv.className = 'message';
            }, 3000);
        }

        function resetGame() {
            initializeGame();
            showMessage('New game started!', 'success');
        }

        // CSS Animation for dice
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                0% { transform: rotateX(0deg) rotateY(0deg); }
                100% { transform: rotateX(360deg) rotateY(360deg); }
            }
        `;
        document.head.appendChild(style);

        // Initialize on load
        window.addEventListener('load', initializeGame);
    </script>
</body>
</html>
